<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Customer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h1 class="mb-4">Add Customer</h1>
      <form id="customerForm" class="needs-validation" novalidate>
        <!-- Name -->
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" class="form-control" required />
          <div class="invalid-feedback">Please enter only alphabets.</div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" required />
          <div class="invalid-feedback">
            Please enter a valid email address.
          </div>
        </div>

        <!-- Contact -->
        <div class="mb-3">
          <label for="contact" class="form-label">Contact No</label>
          <input type="text" id="contact" class="form-control" required />
          <div class="invalid-feedback">
            Contact must be 10 digits, starting with 7–9.
          </div>
        </div>

        <!-- Account Type -->
        <div class="mb-3">
          <label for="accountType" class="form-label">Account Type</label>
          <select id="accountType" class="form-select" required>
            <option value="">Select account type</option>
            <option value="Savings">Savings</option>
            <option value="Current">Current</option>
          </select>
          <div class="invalid-feedback">Please select an account type.</div>
        </div>

        <button type="submit" class="btn btn-primary">Add Customer</button>
      </form>

      <!-- Table -->
      <h2 class="mt-5">Customer List</h2>
      <table class="table table-bordered mt-3">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Contact</th>
            <th>Account Type</th>
          </tr>
        </thead>
        <tbody id="customerTable"></tbody>
      </table>
    </div>

    <script src="script.js"></script>
  </body>
</html>
